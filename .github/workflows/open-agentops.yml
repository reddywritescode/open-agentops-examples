name: Open AgentOps Examples

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  customer-support:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Open AgentOps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "git+https://github.com/reddywritescode/open-agentops.git@main"
      - name: Run customer support e2e
        run: |
          PYTHON=python bash customer-support/run_e2e.sh customer-support-e2e
      - name: Upload Open AgentOps artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: customer-support-agentops
          path: |
            customer-support-e2e/E2E_SUMMARY.md
            customer-support-e2e/artifacts/**
            customer-support-e2e/customer-repo/.agentops/downstream-e2e/**
